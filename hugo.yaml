baseURL: 'https://www.1612.it/'
languageCode: it-it
title: 'LAB1612'
theme: PaperMod
enableRobotsTXT: true

# ← outputs QUI, non dentro params!
outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  # label:
  #   text: "Lab1612"
  #   # icon: /images/logo-lab1612-leo.svg
  #   icon: /images/logo_lab1612_leo.jpg
  #   iconHeight: 60
  profileMode:
    imageUrl: "/images/logo_lab1612_leo.jpg"
    
  description: 'Blog su stampa 3D, programmazione, intelligenza artificiale e tecnologia'
  author: 'cbor'
  
  # Colori tema coordinati con il logo
  defaultTheme: dark  # Forza tema scuro come il logo
  
  ShowSearchPage: true
  ShowReadingTime: true
  ShowBreadCrumbs: true
  ShowShareButtons: true
  ShowCodeCopyButtons: true

  homeInfoParams:
    Title: "Ciao! 👋"
    Content: >
      Benvenuto su 1612.it - il mio angolo di web dove scrivo di 
      **stampa 3D**, **programmazione**, **AI** e tecnologia in generale.

  socialIcons:
    - name: github
      url: "https://github.com/chrisdaloa"
    - name: email
      url: "mailto:chrisdaloa@gmail.com"

menu:
  main:
    - name: Articoli
      url: /posts/
      weight: 10
    - name: Categorie
      url: /categories/
      weight: 20
    - name: Tags
      url: /tags/
      weight: 30
    - name: Cerca
      url: /search/
      weight: 40
    - name: Chi sono
      url: /chi-sono/
      weight: 50
    - name: Contatti
      url: /contatti/
      weight: 60
    - name: Privacy
      url: /privacy/
      weight: 70

markup:
  highlight:
    style: monokai
    lineNos: true

taxonomies:
  category: categories
  tag: tags

minify:
  disableJSON: true

services:
  googleAnalytics:
    ID: G-DLD6641Y6D




